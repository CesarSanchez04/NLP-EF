version: '3.8'

services:
  web:
    build: .
    container_name: nlp_bi_mamba_app
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - ENV=development
    restart: unless-stopped

  jupyter:
    build: .
    container_name: nlp_bi_mamba_jupyter
    ports:
      - "8888:8888"
    volumes:
      - .:/app
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token='' --NotebookApp.password=''
    restart: unless-stopped
